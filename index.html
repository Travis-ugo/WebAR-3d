<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student WebAR App: Interactive Dinosaur Tracking</title>
  
  <!-- Load A-Frame, MindAR, and A-Frame Extras (for glTF animations) -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.2.0/dist/aframe-extras.min.js"></script>
  <script>
    // =========================================================================
    // 1. MINDAR CAMERA SAFETY PATCH
    // =========================================================================
    // If targets.mind only has 1 target (index 0) during testing, A-Frame will normally 
    // crash when trying to initialize entities for target 1 (Tree) and 2 (Meat).
    // This patch intercepts setupAnchor and safely skips missing targets instead of crashing.
    if (AFRAME.registeredSystems['mindar-image-system']) {
      const systemProto = AFRAME.registeredSystems['mindar-image-system'].prototype;
      const originalSetupAnchor = systemProto.setupAnchor;
      systemProto.setupAnchor = function (targetIndex, el) {
        if (!this.anchors || targetIndex >= this.anchors.length) {
          console.warn(`[MindAR Patch] targetIndex ${targetIndex} is out of bounds for current targets (${this.anchors ? this.anchors.length : 0} loaded). Skipping setup for index ${targetIndex} to prevent camera crash.`);
          return;
        }
        return originalSetupAnchor.call(this, targetIndex, el);
      };
    }
  </script>

  <script>
    // =========================================================================
    // 2. REGISTER THE INTERACTIVE DINOSAUR BEHAVIOR COMPONENT
    // =========================================================================
    // We register this in the head so A-Frame compiles it before rendering the scene body.
    AFRAME.registerComponent('dino-behavior', {
      init: function () {
        this.dinoModel = document.querySelector("#dino-model");
        this.dinoWrapper = document.querySelector("#dino-model-wrapper");
        this.meatTarget = document.querySelector("#meat-target");
        this.treeTarget = document.querySelector("#tree-target");
        this.treeGltf = document.querySelector("#tree-target a-gltf-model");
        this.ambientLight = document.querySelector("#ambient-light");
        
        // Tracking states
        this.dinoVisible = false;
        this.meatVisible = false;
        this.treeVisible = false;
        
        this.isEating = false;
        this.isWalking = false;
        this.isScratching = false;
        
        // Default home state positions
        this.homePos = new THREE.Vector3(0, 0, 0);
        
        // Default animations (will overwrite if clips found in your model)
        this.clipIdle = 'Idle';
        this.clipWalk = 'Walk';
        this.clipEat = 'Attack';
        
        this.updateHUD = this.updateHUD.bind(this);
        this.resetDino = this.resetDino.bind(this);

        // Target found/lost event listeners
        this.el.addEventListener('targetFound', () => {
          this.dinoVisible = true;
          this.updateHUD();
          if (window.dinoAudio) {
            window.dinoAudio.playRoar();
          }
        });
        this.el.addEventListener('targetLost', () => {
          this.dinoVisible = false;
          this.resetDino();
          this.updateHUD();
        });

        if (this.meatTarget) {
          this.meatTarget.addEventListener('targetFound', () => {
            this.meatVisible = true;
            this.updateHUD();
          });
          this.meatTarget.addEventListener('targetLost', () => {
            this.meatVisible = false;
            this.resetDino();
            this.updateHUD();
          });
        }

        if (this.treeTarget) {
          this.treeTarget.addEventListener('targetFound', () => {
            this.treeVisible = true;
            this.updateHUD();
          });
          this.treeTarget.addEventListener('targetLost', () => {
            this.treeVisible = false;
            this.resetDino();
            this.updateHUD();
          });
        }

        // Dynamic GLTF animation resolver: scans loaded clips in your GLB file
        if (this.dinoModel) {
          this.dinoModel.addEventListener('model-loaded', (e) => {
            const animations = e.detail.model.animations;
            if (animations && animations.length > 0) {
              const animNames = animations.map(a => a.name.toLowerCase());
              
              // Find index of clips matching name patterns
              const walkIndex = animNames.findIndex(name => name.includes('walk') || name.includes('run'));
              const eatIndex = animNames.findIndex(name => name.includes('eat') || name.includes('attack') || name.includes('bite') || name.includes('hit') || name.includes('chew') || name.includes('roar'));
              const idleIndex = animNames.findIndex(name => name.includes('idle') || name.includes('stay') || name.includes('wait') || name.includes('default'));
              
              // Fallback to the first animation clip if no matching keyword is found
              this.clipWalk = walkIndex !== -1 ? animations[walkIndex].name : animations[0].name;
              this.clipEat = eatIndex !== -1 ? animations[eatIndex].name : animations[0].name;
              this.clipIdle = idleIndex !== -1 ? animations[idleIndex].name : animations[0].name;
              
              console.log(`Resolved GLTF Clips -> Idle: ${this.clipIdle}, Walk: ${this.clipWalk}, Eat: ${this.clipEat}`);
              this.dinoModel.setAttribute('animation-mixer', {
                clip: this.clipIdle,
                loop: 'repeat',
                crossFadeDuration: 0.4
              });
            }
          });
        }
      },

      updateHUD: function () {
        const headerStatus = document.getElementById("header-status");
        const statusToast = document.getElementById("status-toast");
        if (!headerStatus || !statusToast) return;
        
        let statusText = "Scanning Targets...";
        let toastText = "Align target cards inside the frame";
        let statusColor = "#ffffff";
        
        const isMeatActive = this.meatVisible || window.isMeatSimulated;

        if (this.dinoVisible) {
          statusText = "Dinosaur Detected! 🦖";
          toastText = "Dinosaur is looking around.";
          statusColor = "#b45309"; // Amber/Brown
          
          if (isMeatActive) {
            statusText = "Meat Detected! 🥩 Hungry Dino!";
            toastText = "Dinosaur is moving towards the meat!";
            statusColor = "#f43f5e"; // Rose/Red
          } else if (this.treeVisible) {
            statusText = "Tree Spotted! 🌲 Interaction Mode";
            toastText = "Dino walks to the tree to scratch against it!";
            statusColor = "#10b981"; // Vibrant Green
          }
        } else {
          if (isMeatActive) {
            statusText = "Meat Detected! 🥩";
            toastText = "Scan Dinosaur card to feed it!";
            statusColor = "#ef4444";
          } else if (this.treeVisible) {
            statusText = "Tree Detected! 🌲";
            toastText = "Scan Dinosaur card to view the forest!";
            statusColor = "#3b82f6";
          }
        }
        
        headerStatus.textContent = statusText;
        headerStatus.style.color = statusColor;
        statusToast.textContent = toastText;

        const scanBox = document.getElementById("scan-box");
        if (scanBox) {
          if (this.dinoVisible || this.treeVisible || isMeatActive) {
            scanBox.classList.add("tracked");
          } else {
            scanBox.classList.remove("tracked");
          }
        }
      },

      tick: function (time, timeDelta) {
        if (!this.dinoVisible || !this.dinoWrapper || !this.dinoModel) return;

        const wrapper = this.dinoWrapper.object3D;
        const model = this.dinoModel.object3D;
        const isMeatActive = this.meatVisible || window.isMeatSimulated;

        // Dynamic Lighting State Properties
        let targetLightColor = new THREE.Color("#ffffff");
        let targetIntensity = 1.2;

        if (isMeatActive) {
          // ==========================================
          // STATE 1: WALK / EAT MEAT (High Priority)
          // ==========================================
          if (this.isScratching) {
            this.isScratching = false;
            if (window.dinoAudio) window.dinoAudio.stopScratching();
            if (this.treeGltf) this.treeGltf.object3D.rotation.z = 0;
          }

          // Calculate Meat 3D world position
          const meatWorldPos = new THREE.Vector3();
          if (window.isMeatSimulated) {
            const dinoWorldPos = new THREE.Vector3();
            this.el.object3D.getWorldPosition(dinoWorldPos);
            meatWorldPos.copy(dinoWorldPos).add(new THREE.Vector3(0.25, 0, -0.05));
          } else {
            if (this.meatTarget) {
              this.meatTarget.object3D.getWorldPosition(meatWorldPos);
            } else {
              return;
            }
          }

          const currentWorldPos = new THREE.Vector3();
          wrapper.getWorldPosition(currentWorldPos);
          const distance = currentWorldPos.distanceTo(meatWorldPos);
          const localTargetPos = this.el.object3D.worldToLocal(meatWorldPos.clone());
          localTargetPos.y = 0;

          // Proximity light glow calculations
          if (distance < 0.6) {
            const t = Math.max(0, 1 - (distance / 0.6));
            targetLightColor.lerp(new THREE.Color("#f43f5e"), t);
            targetIntensity = 1.2 + (t * 0.4);
          }

          if (distance > 0.24) {
            // Walk to food
            if (this.isEating) {
              this.isEating = false;
              if (window.dinoAudio) window.dinoAudio.stopChewing();
            }

            const angle = Math.atan2(localTargetPos.x - wrapper.position.x, localTargetPos.z - wrapper.position.z);
            let diff = angle - wrapper.rotation.y;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            wrapper.rotation.y += diff * 0.1;

            const dir = new THREE.Vector3().subVectors(localTargetPos, wrapper.position).normalize();
            const walkSpeed = 0.72 * (timeDelta / 1000);
            wrapper.position.addScaledVector(dir, walkSpeed);

            if (!this.isWalking) {
              this.isWalking = true;
              this.dinoModel.setAttribute('animation-mixer', {
                clip: this.clipWalk,
                loop: 'repeat',
                crossFadeDuration: 0.3
              });
              if (window.dinoAudio) window.dinoAudio.startWalking();
            }

            model.position.y = Math.abs(Math.sin(time * 0.006)) * 0.005;
            model.rotation.z = Math.sin(time * 0.006) * 0.05;
            
          } else {
            // Eat food
            this.isWalking = false;
            if (window.dinoAudio) window.dinoAudio.stopWalking();

            if (!this.isEating) {
              this.isEating = true;
              this.dinoModel.setAttribute('animation-mixer', {
                clip: this.clipEat,
                loop: 'repeat',
                crossFadeDuration: 0.3
              });
              if (window.dinoAudio) window.dinoAudio.startChewing();

              const meatModel = document.querySelector("#meat-model-entity");
              const meatFallback = document.querySelector("#meat-fallback");
              if (meatModel) {
                meatModel.setAttribute("animation", "property: scale; to: 0 0 0; dur: 2000; easing: easeOutQuad");
              }
              if (meatFallback) {
                meatFallback.setAttribute("animation", "property: scale; to: 0 0 0; dur: 2000; easing: easeOutQuad");
              }
            }

            const localDist = wrapper.position.distanceTo(localTargetPos);
            if (localDist > 0.05) {
              const angle = Math.atan2(localTargetPos.x - wrapper.position.x, localTargetPos.z - wrapper.position.z);
              wrapper.rotation.y = angle;
            }
            
            model.position.y = 0;
            model.rotation.z = 0;
          }

        } else if (this.treeVisible && this.treeTarget) {
          // ==========================================
          // STATE 2: WALK / SCRATCH TREE (Fallback)
          // ==========================================
          if (this.isEating) {
            this.isEating = false;
            if (window.dinoAudio) window.dinoAudio.stopChewing();
          }

          const treeWorldPos = new THREE.Vector3();
          this.treeTarget.object3D.getWorldPosition(treeWorldPos);

          const currentWorldPos = new THREE.Vector3();
          wrapper.getWorldPosition(currentWorldPos);
          const distance = currentWorldPos.distanceTo(treeWorldPos);
          const localTargetPos = this.el.object3D.worldToLocal(treeWorldPos.clone());
          localTargetPos.y = 0;

          // Proximity light glow calculations
          if (distance < 0.6) {
            const t = Math.max(0, 1 - (distance / 0.6));
            targetLightColor.lerp(new THREE.Color("#10b981"), t);
            targetIntensity = 1.2 + (t * 0.3);
          }

          if (distance > 0.24) {
            // Walk to Tree
            if (this.isScratching) {
              this.isScratching = false;
              if (window.dinoAudio) window.dinoAudio.stopScratching();
              if (this.treeGltf) this.treeGltf.object3D.rotation.z = 0;
            }

            const angle = Math.atan2(localTargetPos.x - wrapper.position.x, localTargetPos.z - wrapper.position.z);
            let diff = angle - wrapper.rotation.y;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            wrapper.rotation.y += diff * 0.1;

            const dir = new THREE.Vector3().subVectors(localTargetPos, wrapper.position).normalize();
            const walkSpeed = 0.72 * (timeDelta / 1000);
            wrapper.position.addScaledVector(dir, walkSpeed);

            if (!this.isWalking) {
              this.isWalking = true;
              this.dinoModel.setAttribute('animation-mixer', {
                clip: this.clipWalk,
                loop: 'repeat',
                crossFadeDuration: 0.3
              });
              if (window.dinoAudio) window.dinoAudio.startWalking();
            }

            model.position.y = Math.abs(Math.sin(time * 0.006)) * 0.005;
            model.rotation.z = Math.sin(time * 0.006) * 0.05;

          } else {
            // Scratch Tree
            this.isWalking = false;
            if (window.dinoAudio) window.dinoAudio.stopWalking();

            if (!this.isScratching) {
              this.isScratching = true;
              this.dinoModel.setAttribute('animation-mixer', {
                clip: this.clipEat,
                loop: 'repeat',
                crossFadeDuration: 0.3
              });
              if (window.dinoAudio) window.dinoAudio.startScratching();
            }

            // Animate Tree Shaking
            if (this.treeGltf) {
              this.treeGltf.object3D.rotation.z = Math.sin(time * 0.03) * 0.06;
            }

            const localDist = wrapper.position.distanceTo(localTargetPos);
            if (localDist > 0.05) {
              const angle = Math.atan2(localTargetPos.x - wrapper.position.x, localTargetPos.z - wrapper.position.z);
              wrapper.rotation.y = angle;
            }

            model.position.y = 0;
            model.rotation.z = 0;
          }

        } else {
          // ==========================================
          // STATE 3: WALK HOME / IDLE (Rest)
          // ==========================================
          if (this.isScratching) {
            this.isScratching = false;
            if (window.dinoAudio) window.dinoAudio.stopScratching();
            if (this.treeGltf) this.treeGltf.object3D.rotation.z = 0;
          }
          if (this.isEating) {
            this.isEating = false;
            if (window.dinoAudio) window.dinoAudio.stopChewing();
          }

          const distToHome = wrapper.position.distanceTo(this.homePos);

          if (distToHome > 0.01) {
            // Restore meat dimensions if lost
            const meatModel = document.querySelector("#meat-model-entity");
            const meatFallback = document.querySelector("#meat-fallback");
            if (meatModel) {
              meatModel.removeAttribute("animation");
              meatModel.setAttribute("scale", "1 1 1");
            }
            if (meatFallback) {
              meatFallback.removeAttribute("animation");
              meatFallback.setAttribute("scale", "1 1 1");
            }

            const angle = Math.atan2(0 - wrapper.position.x, 0 - wrapper.position.z);
            let diff = angle - wrapper.rotation.y;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            wrapper.rotation.y += diff * 0.1;

            const dir = new THREE.Vector3().subVectors(this.homePos, wrapper.position).normalize();
            const walkSpeed = 0.72 * (timeDelta / 1000);
            wrapper.position.addScaledVector(dir, walkSpeed);

            if (!this.isWalking) {
              this.isWalking = true;
              this.dinoModel.setAttribute('animation-mixer', {
                clip: this.clipWalk,
                loop: 'repeat',
                crossFadeDuration: 0.3
              });
              if (window.dinoAudio) window.dinoAudio.startWalking();
            }

            model.position.y = Math.abs(Math.sin(time * 0.006)) * 0.005;
            model.rotation.z = Math.sin(time * 0.006) * 0.05;

          } else {
            // Arrived home, stand idle
            if (this.isWalking) {
              this.resetDino();
            }
          }
        }

        // Apply Dynamic Proximity Lights smoothly
        if (this.ambientLight) {
          const lightComponent = this.ambientLight.getAttribute("light");
          if (lightComponent) {
            const currentColor = new THREE.Color(lightComponent.color || "#ffffff");
            currentColor.lerp(targetLightColor, 0.08);
            
            const currentIntensity = parseFloat(lightComponent.intensity || 1.2);
            const nextIntensity = currentIntensity + (targetIntensity - currentIntensity) * 0.08;
            
            this.ambientLight.setAttribute("light", {
              type: "ambient",
              color: "#" + currentColor.getHexString(),
              intensity: nextIntensity
            });
          }
        }
      },

      resetDino: function () {
        this.isWalking = false;
        this.isEating = false;
        this.isScratching = false;

        if (window.dinoAudio) {
          window.dinoAudio.stopWalking();
          window.dinoAudio.stopChewing();
          window.dinoAudio.stopScratching();
        }
        
        if (!this.dinoWrapper || !this.dinoModel) return;
        const wrapper = this.dinoWrapper.object3D;
        const model = this.dinoModel.object3D;
        
        wrapper.position.set(0, 0, 0);
        wrapper.rotation.set(0, 0, 0);
        
        model.position.set(0, 0, 0);
        model.rotation.set(0, 0, 0);

        if (this.treeGltf) {
          this.treeGltf.object3D.rotation.z = 0;
        }

        this.dinoModel.setAttribute('animation-mixer', {
          clip: this.clipIdle,
          loop: 'repeat',
          crossDuration: 0.3
        });

        // Reset meat elements
        const meatModel = document.querySelector("#meat-model-entity");
        const meatFallback = document.querySelector("#meat-fallback");
        if (meatModel) {
          meatModel.removeAttribute("animation");
          meatModel.setAttribute("scale", "1 1 1");
        }
        if (meatFallback) {
          meatFallback.removeAttribute("animation");
          meatFallback.setAttribute("scale", "1 1 1");
        }
      }
    });

    // =========================================================================
    // 3. REGISTER THE TREE COLOR PATCH COMPONENT
    // =========================================================================
    AFRAME.registerComponent('tree-color-patch', {
      init: function () {
        this.el.addEventListener('model-loaded', (e) => {
          const model = e.detail.model;
          model.traverse((node) => {
            if (node.isMesh) {
              const name = node.name.toLowerCase();
              if (node.material) {
                node.material = node.material.clone(); // Clone material to avoid sharing
                if (name.includes('leaf') || name.includes('leaves')) {
                  node.material.color.set('#22c55e'); // Vibrant Green
                  node.material.roughness = 0.6;
                  node.material.metalness = 0.1;
                } else if (name.includes('bark') || name.includes('trunk') || name.includes('stem') || name.includes('root') || name.includes('wood')) {
                  node.material.color.set('#78350f'); // Wood Brown
                  node.material.roughness = 0.9;
                  node.material.metalness = 0.05;
                }
              }
            }
          });
        });
      }
    });

    // =========================================================================
    // 4. REGISTER WEB AUDIO API SYNTHESIZER
    // =========================================================================
    class ARAudioSynthesizer {
      constructor() {
        this.ctx = null;
        this.walkInterval = null;
        this.isWalking = false;
        this.chewInterval = null;
        this.isChewing = false;
        this.scratchInterval = null;
        this.isScratching = false;
      }

      init() {
        if (this.ctx) return;
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        this.ctx = new AudioContextClass();
        console.log("[ARAudioSynthesizer] AudioContext initialized successfully.");
      }

      resume() {
        if (this.ctx && this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      }

      playRoar() {
        this.init();
        this.resume();
        if (!this.ctx) return;

        const now = this.ctx.currentTime;
        
        // 1. Create nodes
        const osc1 = this.ctx.createOscillator();
        const osc2 = this.ctx.createOscillator();
        const noiseNode = this.ctx.createBufferSource();
        const lowpass = this.ctx.createBiquadFilter();
        const mainGain = this.ctx.createGain();

        // 2. Configure noise (textured growl)
        const bufferSize = this.ctx.sampleRate * 2.0; // 2 seconds of noise
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
        noiseNode.buffer = buffer;
        noiseNode.loop = true;

        // Noise filter (guttural gravel)
        const noiseFilter = this.ctx.createBiquadFilter();
        noiseFilter.type = 'bandpass';
        noiseFilter.frequency.setValueAtTime(100, now);
        noiseFilter.Q.setValueAtTime(4.0, now);

        const noiseGain = this.ctx.createGain();
        noiseGain.gain.setValueAtTime(0.5, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 1.8);

        // 3. Configure low pitch oscillators
        osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(80, now);
        osc1.frequency.exponentialRampToValueAtTime(35, now + 1.5);

        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(85, now);
        osc2.frequency.exponentialRampToValueAtTime(30, now + 1.5);

        const oscGain = this.ctx.createGain();
        oscGain.gain.setValueAtTime(0.8, now);
        oscGain.gain.exponentialRampToValueAtTime(0.01, now + 1.8);

        // 4. Lowpass Filter
        lowpass.type = 'lowpass';
        lowpass.frequency.setValueAtTime(300, now);
        lowpass.frequency.exponentialRampToValueAtTime(90, now + 1.8);
        lowpass.Q.setValueAtTime(6.0, now);

        // 5. Connect Everything
        osc1.connect(oscGain);
        osc2.connect(oscGain);
        
        noiseNode.connect(noiseFilter);
        noiseFilter.connect(noiseGain);

        oscGain.connect(lowpass);
        noiseGain.connect(lowpass);
        
        lowpass.connect(mainGain);
        mainGain.connect(this.ctx.destination);

        // 6. Main Gain volume envelope
        mainGain.gain.setValueAtTime(0, now);
        mainGain.gain.linearRampToValueAtTime(0.9, now + 0.1);
        mainGain.gain.exponentialRampToValueAtTime(0.4, now + 0.8);
        mainGain.gain.exponentialRampToValueAtTime(0.001, now + 1.8);

        // 7. Start & Stop
        osc1.start(now);
        osc2.start(now);
        noiseNode.start(now);

        osc1.stop(now + 1.8);
        osc2.stop(now + 1.8);
        noiseNode.stop(now + 1.8);
      }

      startWalking() {
        this.init();
        this.resume();
        if (!this.ctx || this.isWalking) return;
        this.isWalking = true;

        const playStep = () => {
          const now = this.ctx.currentTime;
          
          // Low freq footstep thud
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          
          osc.type = 'sine';
          osc.frequency.setValueAtTime(65, now);
          osc.frequency.exponentialRampToValueAtTime(20, now + 0.25);
          
          gain.gain.setValueAtTime(0.6, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
          
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          
          osc.start(now);
          osc.stop(now + 0.3);
        };

        // Play footsteps every 800ms
        playStep();
        this.walkInterval = setInterval(playStep, 800);
      }

      stopWalking() {
        if (this.walkInterval) {
          clearInterval(this.walkInterval);
          this.walkInterval = null;
        }
        this.isWalking = false;
      }

      startChewing() {
        this.init();
        this.resume();
        if (!this.ctx || this.isChewing) return;
        this.isChewing = true;

        const playChew = () => {
          const now = this.ctx.currentTime;
          
          // Synthetic bite/crunch: bandpass filtered noise bursts
          const bufferSize = this.ctx.sampleRate * 0.15; // 0.15 seconds
          const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
          }
          
          const noise = this.ctx.createBufferSource();
          noise.buffer = buffer;
          
          const filter = this.ctx.createBiquadFilter();
          filter.type = 'bandpass';
          filter.frequency.setValueAtTime(600, now);
          filter.Q.setValueAtTime(2.0, now);
          
          const gain = this.ctx.createGain();
          gain.gain.setValueAtTime(0.4, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.14);
          
          noise.connect(filter);
          filter.connect(gain);
          gain.connect(this.ctx.destination);
          
          noise.start(now);
          noise.stop(now + 0.15);
        };

        playChew();
        this.chewInterval = setInterval(playChew, 350); // Fast chewing sounds
      }

      stopChewing() {
        if (this.chewInterval) {
          clearInterval(this.chewInterval);
          this.chewInterval = null;
        }
        this.isChewing = false;
      }

      startScratching() {
        this.init();
        this.resume();
        if (!this.ctx || this.isScratching) return;
        this.isScratching = true;

        const playRustle = () => {
          const now = this.ctx.currentTime;
          
          // Sound of leaves rustling and branch scraping (white noise + higher frequency BP filter)
          const bufferSize = this.ctx.sampleRate * 0.25; // 0.25 seconds
          const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
          }
          
          const noise = this.ctx.createBufferSource();
          noise.buffer = buffer;
          
          const filter = this.ctx.createBiquadFilter();
          filter.type = 'bandpass';
          filter.frequency.setValueAtTime(2200, now);
          filter.Q.setValueAtTime(1.0, now);
          
          const gain = this.ctx.createGain();
          // Modulate gain slightly for scratching texture
          gain.gain.setValueAtTime(0.2, now);
          gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.24);
          
          noise.connect(filter);
          filter.connect(gain);
          gain.connect(this.ctx.destination);
          
          noise.start(now);
          noise.stop(now + 0.25);
        };

        playRustle();
        this.scratchInterval = setInterval(playRustle, 500); // Scratch every 500ms
      }

      stopScratching() {
        if (this.scratchInterval) {
          clearInterval(this.scratchInterval);
          this.scratchInterval = null;
        }
        this.isScratching = false;
      }
    }

    // Instantiated globally so entities and UI can trigger it
    window.dinoAudio = new ARAudioSynthesizer();
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0f172a; /* Sleek dark theme */
      color: #ffffff;
      font-family: Arial, sans-serif;

      overflow-y: auto;

    }

    #ar-scene {
      position: absolute;
      top: 0px;
      left: 0px;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: block;
    }

    .header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background-color: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      padding: 14px;
      text-align: center;
      box-sizing: border-box;
      z-index: 10;

    }

    #start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #11263d;
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .start-container {
      background-color: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 30px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
    }

    .start-container h1 {
      margin-top: 0;
      font-size: 1.7rem;
      color: #6366f1;
    }

    .start-container p {
      color: #9ca3af;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .start-btn {
      background-color: #6366f1;
      color: #ffffff;
      border: none;
      padding: 14px 28px;
      font-size: 1.05rem;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;

    #scan-box {
      position: absolute;

    #status-toast {

      border-radius: 30px;

      pointer-events: none;

    /* Simulation Trigger Button */
    #rotate-button {
      position: absolute;
      bottom: 24px;
      right: 24px;
      background-color: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #ffffff;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;

      outline: none;

      background-color: #6366f1;
      transform: scale(1.08);
    }

    #rotate-button:active {
      transform: scale(0.92);
    }

    #spin-flash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background-color: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #ffffff;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #spin-flash.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);

  </style>
</head>
<body>

  <!-- Startup Screen Overlay -->
  <div id="start-screen">
    <div class="start-container">
      <img src="assets/dino_card.png" alt="Dino Card Preview" class="start-logo" style="width: 120px; height: 120px; border-radius: 12px; margin-bottom: 16px; border: 2px solid #10b981;">
      <h1>Dinosaur WebAR Tracker</h1>
      <p>Tap the button below, allow camera permissions, and point your phone camera at the Dinosaur card image to spawn the 3D dinosaur.</p>
      <button class="start-btn" id="start-button">Start Camera</button>
    </div>
  </div>

  <!-- Header HUD status bar -->
  <div class="header">
    <h2 id="header-status">WebAR Student Sandbox</h2>
  </div>

  <!-- Dashed guideline frame in the center -->
  <div id="scan-box"></div>

  <!-- Bottom toast capsule instructions -->
  <div id="status-toast">Align card inside the frame</div>

  <!-- Floating simulation toggle action button -->
  <button id="rotate-button" aria-label="Toggle model rotation"></button>

  <!-- Large central popup overlay flashing status on toggle -->
  <div id="spin-flash" aria-hidden="true">
    <div id="spin-flash-icon"></div>
  </div>

  <!-- A-FRAME Scene Configuration -->
  <a-scene 
    id="ar-scene"
    mindar-image="imageTargetSrc: assets/targets_v5.mind; maxTrack: 3; autoStart: false; filterMinCF:0.0001; filterBeta:0.001; uiScanning: no;" 
    embedded
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false"
    shadow="type: pcfsoft">
    
    <a-assets timeout="15000">
      <!-- Dinosaur Model (Giganotosaurus) -->
      <a-asset-item id="dinoModel" src="assets/dino.glb"></a-asset-item>
      
      <!-- Placeholder Empty Refs for Custom Models -->
      <a-asset-item id="treeModel" src="assets/tree_animate.glb"></a-asset-item>
      <a-asset-item id="meatModel" src="assets/meat.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Scene Lighting -->
    <a-entity id="ambient-light" light="type: ambient; color: #ffffff; intensity: 1.2"></a-entity>
    <a-entity id="main-light" light="type: directional; color: #ffffff; intensity: 0.8; castShadow: true; shadowMapHeight: 2048; shadowMapWidth: 2048; shadowCameraLeft: -1; shadowCameraRight: 1; shadowCameraTop: 1; shadowCameraBottom: -1; shadowCameraNear: 0.1; shadowCameraFar: 10" position="-0.5 1 1"></a-entity>

    <!-- Target Index 2: Dinosaur Card -->
    <a-entity id="dino-target" mindar-image-target="targetIndex: 2" dino-behavior>
      <a-entity id="dino-model-wrapper" position="0 0 0" rotation="0 0 0">
        <!-- 
          Aligning Giganotosaurus Carolinii:
          - rotation: rotates model 90 degrees around X to stand upright on card surface. 
            Change Y-rotation (middle number) to adjust facing direction (e.g. 90 180 0).
          - scale: scales model. Change to make the dinosaur larger/smaller.
          - position: Z value moves it slightly off the card plane to avoid clipping.
        -->
        <a-gltf-model 
          id="dino-model" 
          rotation="0 0 0" 
          position="0 0 0.05" 
          scale="0.25 0.25 0.25" 
          src="#dinoModel"
          shadow="cast: true; receive: true">
        </a-gltf-model>
      </a-entity>
      <a-plane rotation="-90 0 0" width="2" height="2" shadow="receive: true" material="shader: shadow; opacity: 0.45; depthWrite: false" position="0 0 0"></a-plane>
    </a-entity>

    <!-- Target Index 1: Tree Card -->
    <a-entity id="tree-target" mindar-image-target="targetIndex: 1">
      <a-entity id="tree-model-entity" position="0 0 0">
        <a-gltf-model src="#treeModel" scale="0.005 0.005 0.005" rotation="90 0 0" position="0.41 0 0.05" animation-mixer="clip: MorphBake; loop: repeat" tree-color-patch shadow="cast: true; receive: true"></a-gltf-model>
        <a-plane rotation="-90 0 0" width="1" height="1" shadow="receive: true" material="shader: shadow; opacity: 0.45; depthWrite: false" position="0 0 0"></a-plane>
        <a-entity id="tree-fallback" position="0 0 0" rotation="90 0 0" visible="false">
          <a-cone color="#10b981" height="0.35" radius-bottom="0.1" position="0 0.175 0" material="roughness: 0.3; metalness: 0.1"></a-cone>
          <a-cylinder color="#78350f" height="0.1" radius="0.02" position="0 0.05 0"></a-cylinder>
        </a-entity>
      </a-entity>
    </a-entity>

    <!-- Target Index 0: Meat Card -->
    <a-entity id="meat-target" mindar-image-target="targetIndex: 0">
      <a-entity id="meat-model-entity" position="0 0 0">
        <a-gltf-model src="#meatModel" scale="0.02 0.02 0.02" rotation="90 0 0" position="0 0 0.05" shadow="cast: true; receive: true"></a-gltf-model>
        <a-plane rotation="-90 0 0" width="1" height="1" shadow="receive: true" material="shader: shadow; opacity: 0.45; depthWrite: false" position="0 0 0"></a-plane>
        <a-entity id="meat-fallback" position="0 0 0" rotation="90 0 0" visible="false">
          <a-sphere color="#f43f5e" radius="0.04" position="0 0.04 0" scale="1.4 0.9 0.9" material="roughness: 0.4; metalness: 0.2; emissive: #881337; emissiveIntensity: 0.2"></a-sphere>
          <a-cylinder color="#ffffff" height="0.06" radius="0.01" rotation="0 0 45" position="-0.03 0.02 0"></a-cylinder>
        </a-entity>
      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    // Document controls and general UI triggers
    // (The custom dino-behavior component registration is defined in the head section to avoid race conditions)

    // 2. DOCUMENT CONTROLLER EVENTS
    document.addEventListener("DOMContentLoaded", () => {
      const startScreen = document.getElementById("start-screen");
      const startButton = document.getElementById("start-button");
      const rotateButton = document.getElementById("rotate-button"); // Now used as Simulation Button
      const spinFlash = document.getElementById("spin-flash");
      const spinFlashIcon = document.getElementById("spin-flash-icon");
      const headerStatus = document.getElementById("header-status");
      const scanBox = document.getElementById("scan-box");
      const statusToast = document.getElementById("status-toast");
      const arScene = document.getElementById("ar-scene");

      // Repurpose rotate button into "Simulate Meat" button for laptop testing
      window.isMeatSimulated = false;
      let flashTimeoutId = null;

      // Update button visual for simulation helper
      rotateButton.setAttribute("aria-label", "Simulate Meat Target Scan");
      rotateButton.innerHTML = `
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M12 8v8M8 12h8"></path>
        </svg>
      `;

      const startARScanner = () => {
        // Initialize Web Audio context from user gesture
        if (window.dinoAudio) {
          window.dinoAudio.init();
          window.dinoAudio.resume();
        }

        startScreen.style.display = "none";
        scanBox.style.display = "block";
        statusToast.style.display = "block";
        rotateButton.style.display = "flex";
        headerStatus.textContent = "Scanning for targets...";

        sessionStorage.setItem("ar_3d_autostart", "true");

        const arSystem = arScene.systems["mindar-image-system"];
        if (arSystem) {
          arSystem.start();
        }
      };
      const toggleSimulation = () => {
        if (startScreen.style.display !== "none") {
          return;
        }

        window.isMeatSimulated = !window.isMeatSimulated;

        // Visual flash overlay feedback
        spinFlash.classList.remove("show");
        void spinFlash.offsetWidth; // force redraw
        spinFlash.classList.add("show");

        if (window.isMeatSimulated) {
          spinFlashIcon.innerHTML = `
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
          `;
          rotateButton.style.borderColor = "#ef4444";
          statusToast.textContent = "Meat Target Simulated!";
        } else {
          spinFlashIcon.innerHTML = `
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line>
            </svg>
          `;
          rotateButton.style.borderColor = "rgba(255,255,255,0.15)";
          statusToast.textContent = "Meat Simulation Stopped";
        }

        // Propagate changes to custom behavior
        const dinoTarget = document.querySelector("#dino-target");
        if (dinoTarget && dinoTarget.components['dino-behavior']) {
          dinoTarget.components['dino-behavior'].updateHUD();
        }

        clearTimeout(flashTimeoutId);
        flashTimeoutId = setTimeout(() => {
          spinFlash.classList.remove("show");
        }, 800);
      };

      const runAutostart = () => {
        const autostart = sessionStorage.getItem("ar_3d_autostart");
        if (autostart === "true") {
          startARScanner();
        }
      };

      if (arScene.hasLoaded) {
        runAutostart();
      } else {
        arScene.addEventListener("loaded", runAutostart);
      }

      startButton.addEventListener("click", startARScanner);
      rotateButton.addEventListener("click", toggleSimulation);

      // Visibility changes
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          if (startScreen.style.display === "none") {
            const arSystem = arScene.systems["mindar-image-system"];
            if (arSystem && !arSystem.started) {
              arSystem.start();
            }
          }
        }
      });

      // MindAR camera/engine start error event listener
      arScene.addEventListener("arError", (event) => {
        console.error("MindAR start error:", event);
        headerStatus.textContent = "Camera Error ❌";
        headerStatus.style.color = "#ef4444";
        statusToast.textContent = "Camera access blocked. Please check HTTPS and permissions.";
        alert("Camera Error: Access was blocked or failed.\n\nMake sure:\n1. You are visiting via HTTPS (not HTTP)\n2. Camera permissions are allowed.");
      });
    });
  </script>
</body>
</html>
